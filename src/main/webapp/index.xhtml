<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="http://primefaces.org/ui"
    xmlns:app="jakarta.faces.composite/components">
<h:head>
    <title>Gerenciador de Tarefas - JSF</title>
    <h:outputStylesheet library="css" name="index.css"/>
</h:head>

<h:body>
    <!-- Growl centraliza mensagens vindas do bean e do handler global de exceções. -->
    <p:growl id="messages" showDetail="true"/>

    <app:header title="Gerenciador de Tarefas"/>

    <div class="content">
        <!-- O formulário de cadastro e a listagem compartilham o mesmo TarefaBean da view. -->
        <app:cadastroForm id="cadastroComp"/>
        <app:listagemForm id="listagemComp"/>
    </div>

    <app:footer author="Pedro Leonez" year="2026"/>
    <app:confirmDialog yesLabel="Sim" noLabel="Não"/>
</h:body>
</html>
